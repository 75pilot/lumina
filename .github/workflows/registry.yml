name: Lumina Registry Validate

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "registry.json"
      - "scripts/sync-lumina-registry.mjs"
  pull_request:
    paths:
      - "registry/**"
      - "registry.json"
      - "scripts/sync-lumina-registry.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:sync
      - run: pnpm registry:validate
      - run: pnpm registry:build
